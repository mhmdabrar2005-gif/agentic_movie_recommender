<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Movie Recommender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-2xl bg-slate-800 p-8 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-bold text-blue-400 mb-6 text-center">Movie Agent</h1>
        
        <form id="chatForm" class="flex flex-col gap-4">
            <textarea id="moodInput" rows="3" class="p-4 rounded-xl bg-slate-700 text-white focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="What's your vibe right now?" required></textarea>
            <div class="flex gap-3">
                <button type="submit" id="btn" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500 transition-colors">Ask Agent</button>
                <button type="button" id="tmdbCheckBtn" class="px-4 py-3 rounded-xl font-semibold bg-slate-600 hover:bg-slate-500 transition-colors">Check TMDb</button>
            </div>
        </form>

        <div id="tmdbStatus" class="mt-4 hidden p-4 rounded-xl border text-sm"></div>

        <div id="tmdbStatus" class="mt-4 hidden p-4 rounded-xl border text-sm"></div>

        <div id="chatHistory" class="mt-8 flex flex-col gap-4 hidden overflow-y-auto max-h-[50vh] p-4 bg-slate-900 rounded-xl border border-slate-700"></div>
    </div>

    <script>
        let chatMessages = []; // Store history

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const chatHistoryDiv = document.getElementById('chatHistory');
            const moodInput = document.getElementById('moodInput');
            const mood = moodInput.value.trim();

            if (!mood) return;

            // Add User Message to UI
            chatHistoryDiv.classList.remove('hidden');
            chatHistoryDiv.innerHTML += `
                <div class="p-4 bg-blue-600/20 rounded-xl border border-blue-500/30 self-end ml-12 text-right">
                    <p class="text-blue-100">${mood}</p>
                </div>
            `;
            chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;

            // Prepare history to send (excluding the current message which goes in 'mood')
            const historyToSend = [...chatMessages];
            
            // Add user message to state
            chatMessages.push({ role: "user", content: mood });
            
            moodInput.value = ""; // Clear input
            btn.textContent = "Agent is thinking...";
            btn.disabled = true;

            try {
                const res = await fetch('http://localhost:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mood: mood, history: historyToSend })
                });

                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.detail || `Server error: ${res.status}`);

                let text = typeof data.response === 'string' ? data.response.trim() : '';
                if (!text) throw new Error('Received empty response from agent.');

                const fallbackString = "_Note: Fallback mode was used because model tool-calling failed once._";
                const isFallback = text.includes(fallbackString);
                if (isFallback) text = text.replace(fallbackString, "").trim();

                // Add Agent Message to state
                chatMessages.push({ role: "assistant", content: text });

                // Render Agent Message in UI
                let agentHtml = `
                    <div class="p-4 bg-slate-800 rounded-xl border border-slate-600 self-start mr-12 text-left shadow-md">
                        <div class="prose prose-invert max-w-none text-sm">${marked.parse(text)}</div>
                `;
                
                if (isFallback) {
                    agentHtml += `
                        <div class="mt-3 inline-flex items-center gap-2 bg-yellow-500/20 text-yellow-300 border border-yellow-500/50 text-xs font-semibold px-3 py-1.5 rounded-lg">
                            <span>⚠️</span> Fallback mode was used
                        </div>
                    `;
                }
                agentHtml += `</div>`;
                
                chatHistoryDiv.innerHTML += agentHtml;
                chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;

            } catch (err) {
                chatHistoryDiv.innerHTML += `
                    <div class="p-4 bg-red-900/30 rounded-xl border border-red-500/50 self-start mr-12 text-left">
                        <p class="text-red-400 text-sm">Error: ${err.message}</p>
                    </div>
                `;
                chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;
                // Pop the last user message so they can try again if they want
                chatMessages.pop();
            } finally {
                btn.textContent = "Ask Agent";
                btn.disabled = false;
            }
        });

        document.getElementById('tmdbCheckBtn').addEventListener('click', async () => {
            const checkBtn = document.getElementById('tmdbCheckBtn');
            const statusDiv = document.getElementById('tmdbStatus');

            checkBtn.disabled = true;
            checkBtn.textContent = 'Checking...';

            try {
                const res = await fetch('http://localhost:8000/health/tmdb');
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    throw new Error(`Health endpoint failed: ${res.status} ${res.statusText}`);
                }

                const ok = data.ok === true;
                const baseClass = 'mt-4 p-4 rounded-xl border text-sm';
                statusDiv.className = ok
                    ? `${baseClass} bg-emerald-500/10 border-emerald-500/40 text-emerald-300`
                    : `${baseClass} bg-red-500/10 border-red-500/40 text-red-300`;

                statusDiv.innerHTML = ok
                    ? `TMDb reachable (${data.elapsed_seconds}s).`
                    : `TMDb not reachable (${data.status} in ${data.elapsed_seconds}s): ${data.message}`;
                statusDiv.classList.remove('hidden');
            } catch (err) {
                statusDiv.className = 'mt-4 p-4 rounded-xl border text-sm bg-red-500/10 border-red-500/40 text-red-300';
                statusDiv.innerHTML = `TMDb check failed: ${err.message}`;
                statusDiv.classList.remove('hidden');
            } finally {
                checkBtn.disabled = false;
                checkBtn.textContent = 'Check TMDb';
            }
        });
    </script>
</body>
</html>
